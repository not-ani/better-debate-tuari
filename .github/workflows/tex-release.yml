name: publish-tex

on:
  push:
    branches:
      - release
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
      TEX_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json

    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Validate updater secrets
        shell: bash
        run: |
          test -n "$TAURI_SIGNING_PRIVATE_KEY" || { echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY secret."; exit 1; }
          test -n "$TAURI_UPDATER_PUBLIC_KEY" || { echo "::error::Missing TAURI_UPDATER_PUBLIC_KEY secret."; exit 1; }

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Generate Tex release config
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          config = {
              "bundle": {
                  "createUpdaterArtifacts": True,
              },
              "plugins": {
                  "updater": {
                      "pubkey": os.environ["TAURI_UPDATER_PUBLIC_KEY"],
                      "endpoints": [os.environ["TEX_UPDATER_ENDPOINT"]],
                      "windows": {
                          "installMode": "passive",
                      },
                  }
              },
          }

          Path("apps/tex/src-tauri/tauri.release.conf.json").write_text(
              json.dumps(config, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - uses: tauri-apps/tauri-action@dev
        with:
          projectPath: apps/tex
          tagName: tex-v__VERSION__
          releaseName: Tex v__VERSION__
          releaseBody: See the assets to download and install this version of Tex.
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          args: --config src-tauri/tauri.release.conf.json ${{ matrix.args }}
